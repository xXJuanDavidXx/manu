function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(4, 3, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  generateGalaxy();
  addPhrases();
  animate();
}

function generateGalaxy() {
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(params.count * 3);
  const colors = new Float32Array(params.count * 3);

  const colorInside = new THREE.Color(params.colorInside);
  const colorOutside = new THREE.Color(params.colorOutside);

  for(let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const radius = Math.random() * params.radius;
    const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;
    const spinAngle = radius * params.spin;

    const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
    const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
    const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;

    positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
    positions[i3 + 1] = randomY;
    positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

    const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
    colors[i3] = mixedColor.r;
    colors[i3 + 1] = mixedColor.g;
    colors[i3 + 2] = mixedColor.b;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: params.size,
    sizeAttenuation: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true
  });

  points = new THREE.Points(geometry, material);
  scene.add(points);
}

function addPhrases() {
  phrasesGroup = new THREE.Group();
  phrases.forEach((text, i) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 1024; 
    canvas.height = 256; 
    
    const isSpecial = text.includes('pequeña');
    
    ctx.font = isSpecial ? 'Bold 42px Arial' : '32px Arial';

    ctx.fillStyle = '#ffffff';
    
    ctx.textAlign = 'center';
    
    ctx.shadowColor = 'rgba(138, 43, 226, 1)'; 
    ctx.shadowBlur = 12;
    

    ctx.fillText(text, 512, 128); 

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMaterial = new THREE.SpriteMaterial({ 
        map: texture, 
        transparent: true, 
        blending: THREE.AdditiveBlending 
    });
    const sprite = new THREE.Sprite(spriteMaterial);
    
    const angle = (i / phrases.length) * Math.PI * 2;
    const radiusVar = 1.2 + Math.random() * 3.8;
    const yVar = (Math.random() - 0.5) * 2;
    
    sprite.position.set(Math.cos(angle) * radiusVar, yVar, Math.sin(angle) * radiusVar);
    
    const scaleFactor = isSpecial ? 1.4 : 0.8 + Math.random() * 0.4;
    sprite.scale.set(scaleFactor * 2, scaleFactor * 0.5, 1);
    
    phrasesGroup.add(sprite);
  });
  scene.add(phrasesGroup);
}
let analyser, dataArray;
let audioCtx;
let isAudioContextSetup = false;

const playlist = [
  { name: 'Donde Nadie Pueda Ir', src: 'Donde Nadie Pueda Ir.mp3' },
  { name: 'Put Your Head On My Shoulder - Paul Anka', src: 'Paul Anka — Put Your Head On My Shoulder [Letra + video].mp3' },
  { name: 'La Casa Verde', src: 'La Casa Verde.mp3' },

  { name: 'Kharmasutra', src: 'Kharmasutra.mp3' },
  { name: 'Mägo De Oz - Pensando en ti', src: 'Mägo De Oz - Pensando en ti __ Letra.mp3' },
  { name: 'Mon Laferte - La Nave del Olvido', src: 'Mon Laferte - La Nave del Olvido _ Homenaje a José José, Vive Latino 2020.mp3' },
  { name: 'Serenauta - Edson Velandia', src: 'Serenauta- Edson Velandia.mp3' },
  { name: 'Shine On You Crazy Diamond', src: 'Shine On You Crazy Diamond (Pts. 1-5).mp3' },
  { name: 'Fly Me To The Moon - Frank Sinatra', src: 'Frank Sinatra - Fly Me To The Moon (Audio) ft. Count Basie And His Orchestra.mp3' },
  { name: "What You Won't Do for Love", src: "What You Won't Do for Love.mp3" },
  { name: 'MAS QUE AMIGOS - BLESSD', src: 'MAS QUE AMIGOS _ BLESSD ❌ HADES 66 ❌ BLACKINNY ❌ YOUNG FATTY.mp3' }

];
let currentTrackIndex = 0;

function setupAudioContext() {
  if (isAudioContextSetup) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  analyser.fftSize = 256;
  const bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);
  isAudioContextSetup = true;

  // Rotación automática: cuando termina una canción, sigue la siguiente
  audio.onended = () => {
    currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
    playTrack(currentTrackIndex);
  };
}

function updateTrackDisplay(name) {
  const display = document.getElementById('track-display');
  const nameElem = document.getElementById('track-name');
  nameElem.textContent = name;
  display.style.opacity = 1;
  setTimeout(() => { if(display) display.style.opacity = 0.8; }, 2000);
}

function playTrack(index) {
  if (!isAudioContextSetup) setupAudioContext();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  
  currentTrackIndex = index;
  const track = playlist[index];
  audio.src = track.src;
  audio.play();
  playBtn.textContent = '⏸ Pausar';
  updateTrackDisplay(track.name);
}

document.getElementById('nextBtn').onclick = () => {
  playTrack((currentTrackIndex + 1) % playlist.length);
};

document.getElementById('prevBtn').onclick = () => {
  playTrack((currentTrackIndex - 1 + playlist.length) % playlist.length);
};

function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.002;

  let bass = 0;
  if (isAudioContextSetup && !audio.paused) {
    analyser.getByteFrequencyData(dataArray);
    bass = dataArray[2] / 255; 
  }

  // Las estrellas reaccionan a los bajos
  points.material.size = params.size * (1 + bass * 1.5);
  points.rotation.y += 0.0006 + (bass * 0.005);
  phrasesGroup.rotation.y += 0.0012 + (bass * 0.002);
  
  // Las frases laten con el ritmo
  phrasesGroup.children.forEach(sprite => {
    if (!sprite.userData.baseScale) {
        sprite.userData.baseScale = sprite.scale.x / 2;
    }
    const s = sprite.userData.baseScale * (1 + bass * 0.4);
    sprite.scale.set(s * 2, s * 0.5, 1);
  });

  controls.update();
  renderer.render(scene, camera);
  
  const pulseScale = 1 + Math.sin(time) * 0.1 + (bass * 0.2);
  const centerTextElement = document.getElementById('dynamic-center-text');
  if(centerTextElement) {
    centerTextElement.style.transform = `translate(-50%, -50%) scale(${pulseScale})`;
  }
}

const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
playBtn.onclick = () => {
  if (!isAudioContextSetup) setupAudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (audio.paused) { 
    audio.play(); 
    playBtn.textContent = '⏸ Pausar'; 
    updateTrackDisplay(playlist[currentTrackIndex].name);
  }
  else { 
    audio.pause(); 
    playBtn.textContent = '▶ Iniciar'; 
  }
};

document.getElementById('pickBtn').onclick = () => document.getElementById('pickFile').click();
document.getElementById('pickFile').onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    if (!isAudioContextSetup) setupAudioContext();
    const url = URL.createObjectURL(file);
    const newTrack = { name: file.name.split('.')[0], src: url };
    playlist.push(newTrack);
    playTrack(playlist.length - 1);
  }
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const centerPhrases = [

];

let phraseIndex = 0;
function updateCenterText() {
  const centerTextElement = document.getElementById('dynamic-center-text');
  if(centerTextElement) {
    centerTextElement.style.opacity = 0;
    setTimeout(() => {
      phraseIndex = (phraseIndex + 1) % centerPhrases.length;
      centerTextElement.textContent = centerPhrases[phraseIndex];
      centerTextElement.style.opacity = 0.8;
    }, 1000);
  }
}

setInterval(updateCenterText, 5000);

init();
