<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>La Galaxia de Manuela ✨</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --void: #04050c;
      --moon: #ece8f5;
      --selene: #c9b3ff;
      --ember: #ff5d8f;
      --torch: #f6a15a;
      --hair: rgba(201, 179, 255, 0.28);
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--void); overflow: hidden; color: var(--moon); font-family: 'Cormorant Garamond', Georgia, serif; }
    #canvas-container { position: fixed; inset: 0; }

    /* viñeta cinematográfica */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 40;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 52%, rgba(2,2,8,0.62) 100%);
    }

    /* texto central — inscripción */
    .center-text {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: inline-block; max-width: 88vw;
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700;
      font-size: clamp(1.3rem, 4.4vw, 2.1rem);
      letter-spacing: 0.01em; text-align: center; line-height: 1.4;
      pointer-events: none; z-index: 50;
      padding: 0.55em 1.1em; border-radius: 24px;
      text-shadow: 0 0 4px rgba(4,5,12,1), 0 0 12px rgba(4,5,12,0.96), 0 0 26px var(--ember);
      background: radial-gradient(ellipse at center, rgba(4,5,12,0.74) 0%, rgba(4,5,12,0.48) 52%, rgba(4,5,12,0) 82%);
      transition: opacity 1s;
    }

    /* registro astral (arriba dcha) */
    .track-info {
      position: fixed; top: 22px; right: 22px; z-index: 100;
      padding: 12px 18px; text-align: right; pointer-events: none;
      background: linear-gradient(180deg, rgba(9,9,18,0.55), rgba(9,9,18,0.35));
      border: 1px solid var(--hair); border-radius: 2px;
      backdrop-filter: blur(6px); transition: opacity 0.6s;
    }
    .track-info .eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.34em; color: var(--selene); text-transform: uppercase;
    }
    #track-name {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1.15rem; margin-top: 3px; color: var(--moon);
    }

    /* indicación (arriba izq) */
    .hint {
      position: fixed; top: 24px; left: 24px; z-index: 100;
      max-width: 15rem; pointer-events: none;
      font-family: 'Cinzel', serif; font-size: 0.66rem; font-weight: 500;
      letter-spacing: 0.16em; line-height: 1.7; text-transform: uppercase;
      color: rgba(236, 232, 245, 0.5);
    }
    .hint b { color: var(--selene); font-weight: 600; }

    /* consola — el panel del observatorio */
    .console {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; gap: 22px;
      padding: 12px 26px;
      background: radial-gradient(120% 180% at 50% 0%, rgba(201,179,255,0.10), rgba(6,6,14,0.62) 70%);
      border: 1px solid var(--hair); border-radius: 3px;
      backdrop-filter: blur(9px);
      box-shadow: 0 0 40px rgba(201,179,255,0.12), inset 0 1px 0 rgba(201,179,255,0.14);
    }
    .transport { display: flex; align-items: center; gap: 20px; }

    /* botones — luna menguante · llena · creciente */
    .moon-btn {
      background: none; border: none; padding: 0; cursor: pointer;
      color: var(--selene); line-height: 0;
      transition: color 0.35s ease, transform 0.35s ease, filter 0.35s ease;
    }
    .moon-btn svg { display: block; }
    .moon-btn.side { width: 30px; height: 30px; opacity: 0.75; }
    .moon-btn.full { width: 46px; height: 46px; }
    .moon-btn:hover, .moon-btn:focus-visible {
      color: var(--moon); transform: scale(1.08);
      filter: drop-shadow(0 0 10px rgba(201,179,255,0.8));
      opacity: 1; outline: none;
    }
    .moon-btn:focus-visible { outline: 1px solid var(--selene); outline-offset: 6px; border-radius: 50%; }

    /* luna llena encendida al reproducir (antorcha) */
    body.is-playing .moon-btn.full {
      color: var(--torch);
      filter: drop-shadow(0 0 14px rgba(246,161,90,0.75));
    }

    .divider { width: 1px; height: 26px; background: var(--hair); }

    /* llave de Hécate — añadir música */
    .key-btn {
      background: none; border: none; padding: 4px; cursor: pointer;
      color: var(--selene); line-height: 0; opacity: 0.7;
      transition: color 0.35s ease, transform 0.35s ease, filter 0.35s ease, opacity 0.35s ease;
    }
    .key-btn:hover, .key-btn:focus-visible {
      color: var(--torch); opacity: 1; transform: scale(1.08) rotate(-8deg);
      filter: drop-shadow(0 0 9px rgba(246,161,90,0.7)); outline: none;
    }
    .key-btn:focus-visible { outline: 1px solid var(--selene); outline-offset: 5px; }

    input[type=file] { display: none; }

    @media (prefers-reduced-motion: reduce) {
      *, .center-text, .track-info, .moon-btn, .key-btn { transition: none !important; }
    }
    /* En táctil: sin backdrop-filter (re-difuminar el canvas cada frame es caro) */
    @media (pointer: coarse) {
      .console { backdrop-filter: none; background: rgba(8, 8, 16, 0.82); }
      .track-info { backdrop-filter: none; background: rgba(8, 8, 16, 0.82); }
    }
    @media (max-width: 560px) {
      .hint { display: none; }
      .console { gap: 16px; padding: 10px 18px; }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="canvas-container"></div>
<div id="vignette"></div>

<div id="dynamic-center-text" class="center-text">Es tu universo</div>

<p class="hint">Toca la <b>luna llena</b> para comenzar · toca el <b>centro</b> para transfigurar el cosmos</p>

<div id="track-display" class="track-info" style="opacity: 0;">
  <div class="eyebrow">Suena ahora</div>
  <div id="track-name">Donde Nadie Pueda Ir</div>
</div>

<div class="console">
  <div class="transport">
    <button id="prevBtn" class="moon-btn side" aria-label="Canción anterior">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <defs><mask id="waning"><circle cx="20" cy="20" r="15" fill="#fff"/><circle cx="29" cy="20" r="13.5" fill="#000"/></mask></defs>
        <circle cx="20" cy="20" r="15" fill="currentColor" mask="url(#waning)"/>
      </svg>
    </button>

    <button id="playBtn" class="moon-btn full" aria-label="Reproducir">
      <svg viewBox="0 0 46 46" aria-hidden="true">
        <circle cx="23" cy="23" r="17" fill="currentColor"/>
      </svg>
    </button>

    <button id="nextBtn" class="moon-btn side" aria-label="Siguiente canción">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <defs><mask id="waxing"><circle cx="20" cy="20" r="15" fill="#fff"/><circle cx="11" cy="20" r="13.5" fill="#000"/></mask></defs>
        <circle cx="20" cy="20" r="15" fill="currentColor" mask="url(#waxing)"/>
      </svg>
    </button>
  </div>

  <div class="divider"></div>

  <button id="pickBtn" class="key-btn" aria-label="Añadir tu propia música">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="8" cy="8" r="4.2"/>
      <path d="M11 11 L20 20"/>
      <path d="M16.5 16.5 L19 14"/>
      <path d="M19 19 L21.5 16.5"/>
    </svg>
  </button>
  <input type="file" id="pickFile" accept="audio/*">
  <audio id="audio"><source src="Donde Nadie Pueda Ir.mp3" type="audio/mpeg"></audio>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
