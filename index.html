<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>La Galaxia de Manuela ✨</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas-container { position: fixed; inset: 0; }

    /* viñeta cinematográfica */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 40;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    }

    .center-text {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 1.8rem; font-weight: bold; text-align: center;
      pointer-events: none; text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
      z-index: 50; transition: opacity 1s; width: 85%;
    }

    .hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(10px);
      padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(255,105,180,0.3);
      display: flex; gap: 12px; align-items: center; color: white; z-index: 100;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.2);
    }
    .track-info {
      position: fixed; top: 20px; right: 20px;
      background: rgba(10, 10, 20, 0.6); backdrop-filter: blur(5px);
      padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,105,180,0.2);
      color: white; font-size: 0.9rem; text-align: right; pointer-events: none;
      z-index: 100; transition: opacity 0.5s;
    }
    .hint {
      position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.55);
      font-size: 0.8rem; z-index: 100; pointer-events: none; max-width: 200px;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    .playlist-controls { display: flex; gap: 8px; align-items: center; }
    button {
      background: #ff69b4; border: none; padding: 8px 16px; border-radius: 20px;
      color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    button:hover { background: #ff1493; transform: scale(1.05); }
    input[type=file] { display: none; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="canvas-container"></div>
<div id="vignette"></div>

<div id="dynamic-center-text" class="center-text">Es tu universo</div>

<div class="hint">✨ Toca el texto del centro para cambiar de forma 🌙</div>

<div id="track-display" class="track-info" style="opacity: 0;">
  <div style="font-size: 0.7rem; color: #ff69b4;">REPRODUCIENDO</div>
  <div id="track-name">Donde Nadie Pueda Ir</div>
</div>

<div class="hud">
  <div class="playlist-controls">
    <button id="prevBtn">⏮</button>
    <button id="playBtn">▶ Iniciar</button>
    <button id="nextBtn">⏭</button>
  </div>
  <button id="pickBtn">🎵</button> <input type="file" id="pickFile" accept="audio/*">
  <audio id="audio"><source src="Donde Nadie Pueda Ir.mp3" type="audio/mpeg"></audio>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
